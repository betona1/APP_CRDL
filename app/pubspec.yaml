name: crdl
description: "CRDL(차례대로) — 숫자를 1→N 순서대로 먹는 격자 퍼즐 게임"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon-512.png"
  adaptive_icon_background: "assets/icon/adaptive-bg.png"
  adaptive_icon_foreground: "assets/icon/adaptive-fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Jua
      fonts:
        - asset: assets/fonts/Jua-Regular.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka.ttf
